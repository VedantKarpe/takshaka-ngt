# Builds the Angular production bundle and publishes it to GitHub Pages.
#
# Notes for a project page served from https://<user>.github.io/<repo>/ :
#   • --base-href must be "/<repo>/" so asset URLs resolve under the subpath.
#     It is derived automatically from the repository name below.
#   • The Angular SPA needs a 404.html fallback so deep links / refreshes on
#     client-side routes (e.g. /game) don't 404 — we copy index.html to it.
#   • .npmrc sets legacy-peer-deps=true (the NGT stack lists optional
#     NativeScript peers that otherwise break a clean install).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (production, correct base-href)
        run: npm run build -- --configuration production --base-href "/${GITHUB_REPOSITORY#*/}/"
      - name: SPA 404 fallback
        run: cp dist/takshaka-ngt/browser/index.html dist/takshaka-ngt/browser/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/takshaka-ngt/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
